---
# tasks file for k3s_worker

- name: install k3s
  shell: curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="agent --node-ip {{ worker_private_ip }}" K3S_URL=https://{{ master_private_ip }}:6443 K3S_TOKEN={{ hostvars[groups['master'][0]]['k3s_token'].stdout }} sh -
  creates: /usr/local/bin/k3s

- name: wait for k3s-agent service
  service:
    name: k3s-agent
    state: started
  register: k3sStarted
  until: k3sStarted.status.ActiveState == "active"
  retries: 10
  delay: 10

- name: get master node status
  command: kubectl get node {{ inventory_hostname }}
  register: workerNodeStatus
  until: "'Ready' in workerNodeStatus.stdout"
  retries: 10
  delay: 10
  delegate_to: "{{ groups['master'][0] }}"
